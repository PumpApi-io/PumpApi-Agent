<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PumpApi Agent</title>
  <link rel="icon" type="image/webp" href="/assets/logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css" />
</head>
<body>
  <div id="app"></div>

  <script type="importmap">
    {
      "imports": {
        "vue": "https://esm.sh/vue@3.4.38/dist/vue.esm-browser.prod.js",
        "marked": "https://esm.sh/marked@12.0.2",
        "highlight.js": "https://esm.sh/@highlightjs/cdn-assets@11.9.0/es/highlight.min.js"
      }
    }
  </script>
  <script type="module">
    // Cache-bust app.js using its Last-Modified time so updates always load.
    let v = Date.now();
    try {
      const r = await fetch('/app.js', { method: 'HEAD', cache: 'no-store' });
      const lm = r.headers.get('Last-Modified');
      if (lm) v = new Date(lm).getTime() || v;
    } catch (e) {}
    await import('/app.js?v=' + v);
  </script>
</body>
</html>
